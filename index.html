<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hope with Heidi</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=9" />
</head>
<body>
  <main class="hero">

  <!-- Floral corner accents (clean line art + glow) -->
<div class="florals" aria-hidden="true">
  <svg class="floral f1" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="petalGlow1" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="rgba(201,169,217,0.0)"/>
        <stop offset="0.35" stop-color="rgba(201,169,217,0.65)"/>
        <stop offset="1" stop-color="rgba(201,169,217,0.0)"/>
      </linearGradient>
    </defs>

    <!-- vine -->
    <path class="vine" d="M110 520 C140 380, 220 300, 340 250 C430 210, 470 150, 520 80"
      fill="none" />

    <!-- petals/flowers -->
    <path class="petal" d="M260 320 C245 300, 255 270, 285 265 C315 260, 335 290, 320 315 C305 340, 275 340, 260 320 Z" fill="none"/>
    <path class="petal" d="M360 250 C345 230, 355 200, 385 195 C415 190, 435 220, 420 245 C405 270, 375 270, 360 250 Z" fill="none"/>
    <path class="petal" d="M440 170 C425 150, 435 120, 465 115 C495 110, 515 140, 500 165 C485 190, 455 190, 440 170 Z" fill="none"/>

    <!-- glow overlay (soft) -->
    <path class="glow" d="M110 520 C140 380, 220 300, 340 250 C430 210, 470 150, 520 80"
      fill="none" stroke="url(#petalGlow1)" stroke-width="10" stroke-linecap="round" opacity="0.35"/>
  </svg>

  <svg class="floral f2" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="petalGlow2" x1="1" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="rgba(201,169,217,0.0)"/>
        <stop offset="0.35" stop-color="rgba(201,169,217,0.55)"/>
        <stop offset="1" stop-color="rgba(201,169,217,0.0)"/>
      </linearGradient>
    </defs>

    <!-- vine -->
    <path class="vine" d="M490 90 C470 210, 410 290, 310 345 C220 395, 170 450, 110 520"
      fill="none" />

    <!-- petals/flowers -->
    <path class="petal" d="M360 330 C345 310, 355 280, 385 275 C415 270, 435 300, 420 325 C405 350, 375 350, 360 330 Z" fill="none"/>
    <path class="petal" d="M260 400 C245 380, 255 350, 285 345 C315 340, 335 370, 320 395 C305 420, 275 420, 260 400 Z" fill="none"/>
    <path class="petal" d="M190 470 C175 450, 185 420, 215 415 C245 410, 265 440, 250 465 C235 490, 205 490, 190 470 Z" fill="none"/>

    <!-- glow overlay -->
    <path class="glow" d="M490 90 C470 210, 410 290, 310 345 C220 395, 170 450, 110 520"
      fill="none" stroke="url(#petalGlow2)" stroke-width="10" stroke-linecap="round" opacity="0.30"/>
  </svg>
</div>


    <!-- Butterflies -->
    <div class="butterflies" aria-hidden="true">
      <span class="butterfly b1"></span>
      <span class="butterfly b2"></span>
      <span class="butterfly b3"></span>
      <span class="butterfly b4"></span>
      <span class="butterfly b5"></span>
    </div>

    <!-- Main content -->
    <div class="content">
      <h1>Hope with Heidi</h1>
      <p class="subtitle">
        Gentle guidance. Real growth. A hopeful new beginning.
      </p>

      <a href="#" class="cta">Coming Soon ✨</a>
    </div>

  </main>
</body>
</html>
